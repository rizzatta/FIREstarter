<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREstarter | Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header class="top-header">
        <div class="green-stripe"></div>
        <div class="logo-container">
            <img src="./icons/fs-logo.png" alt="FIREstarter Logo" class="header-logo">
            <span class="logo-text">FIRE<span>starter</span></span>
            <div class="user-badge">
                <span id="displayUsername">User_Archive_01</span>
                <div class="status-dot"></div>
            </div>
        </div>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <nav>
                <a href="#" class="nav-item active">Overview</a>
                <a href="#" class="nav-item">Projections</a>
                <a href="#" class="nav-item">Assets</a>
                <a href="#" class="nav-item">Security Logs</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="welcome-banner">
                <h1>Welcome back, <span id="welcomeName">Explorer</span>.</h1>
                <p>Your FIRE Archive was last updated: <span id="lastUpdate">2026-04-27</span></p>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <h3>Net Worth</h3>
                    <p class="value" id="netWorth">₱0.00</p>
                </div>
                <div class="metric-card success">
                    <h3>FIRE Progress</h3>
                    <p class="value" id="fireProgress">0%</p>
                </div>
                <div class="metric-card orange">
                    <h3>Target Date</h3>
                    <p class="value" id="targetDate">2045</p>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-placeholder">
                    <p>Growth Visualization Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
